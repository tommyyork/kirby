# mraptor scan configuration
file_list = tmp/all_files

# Comma-separated extensions for files that can contain VBA macros
extensions = .doc,.docm,.xls,.xlsm,.xlsb,.ppt,.pptm,.dot,.dotm,.xlt,.xltm,.xla,.xlam,.pot,.potm,.pps,.ppsm,.vsd,.vsdm,.slk

# Skip Windows Recycle Bin $I* metadata sidecars (not real Office files)
exclude_recycle_bin_sidecars = true

# Require file content to match expected Office/OLE format signatures
validate_file_headers = true

# Pass -m to mraptor to include matched heuristic strings in output
show_matches = true
