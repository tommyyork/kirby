# sleuthkit-ntfs scan configuration
targets = device,folder,file

# Local Sleuth Kit install prefix (built by modules/analysis/sleuthkit-mactime/build_sleuthkit.sh)
sleuthkit_prefix = modules/analysis/sleuthkit-mactime/install

# When -t is a mount point, prefer TARGET_DEVICE from sleuthkit.conf over inferred device
prefer_config_device = false

# NTFS paths (leading slash) to sample during volume-level scans
volume_scan_paths = /Users,/Windows/System32,/Program Files,/ProgramData,/Windows/Temp

# Case-insensitive path substrings that suggest malware staging when seen in fls output
suspicious_path_patterns = /Temp/,/AppData/Local/Temp/,/ProgramData/,/Downloads/,/Recycle

# Extensions treated as executable content in fls path heuristics
executable_extensions = .exe,.dll,.sys,.scr,.bat,.cmd,.ps1,.vbs,.js,.hta,.msi,.lnk

# Maximum files to analyze when -t is a directory (0 = unlimited)
max_directory_files = 5000

# Flag $STANDARD_INFORMATION vs $FILE_NAME modified times differing by at least this many seconds
timestomp_seconds_threshold = 60

# Prefer TARGET_DEVICE from sleuthkit.conf for volume scans (same as prefer_config_device)
# Volume scans use fls; directory/file scans map paths through the resolved mount point.
