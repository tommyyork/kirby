# Kirby ClamAV daemon configuration (used by clamd and clamdscan via --config-file)
# Do not use /opt/homebrew/etc/clamav/clamd.conf — this file is module-local.

DatabaseDirectory /opt/homebrew/var/lib/clamav

# Dedicated Kirby clamd instance on localhost (avoids conflicting with system clamd)
TCPSocket 13374
TCPAddr 127.0.0.1

Foreground yes
LogVerbose no
FixStaleSocket yes

# Scanning defaults suited to mounted volume triage
ScanArchive yes
ScanPE yes
ScanELF yes
ScanOLE2 yes
ScanPDF yes
ScanMail yes
HeuristicAlerts yes
AlertEncrypted no
AlertEncryptedArchive no
AlertEncryptedDoc no

MaxScanSize 2000M
MaxFileSize 500M
MaxRecursion 16
