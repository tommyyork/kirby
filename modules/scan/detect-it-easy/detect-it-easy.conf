# detect-it-easy scan configuration
file_list = tmp/all_files

# Path to diec binary (absolute, or relative to project root).
# Official macOS arm64 release (die_mac_qt6_3.21_arm64.pkg):
diec = /Applications/DiE.app/Contents/MacOS/diec
# Local build from source (./modules/scan/detect-it-easy/build.sh):
# diec = modules/scan/detect-it-easy/DIE-engine/build/release/diec

# Signature database paths (relative to project root)
database = modules/scan/detect-it-easy/Detect-it-easy/db
extra_database = modules/scan/detect-it-easy/Detect-it-easy/db_extra
custom_database = modules/scan/detect-it-easy/Detect-it-easy/db_custom

# Comma-separated extensions to scan from the file inventory
extensions = .exe,.dll,.sys,.scr,.com,.bat,.cmd,.ps1,.vbs,.js,.jse,.wsf,.jar,.apk,.msi,.hta,.pif,.cpl,.ocx,.drv,.efi,.lnk,.dylib,.so

# Include extension-less Mach-O binaries under */Contents/MacOS/* (apps, bundles, kexts)
scan_macos_binaries = true

# Detection types that cause a file to be flagged (leading ~ from heuristics is ignored)
# Omit "protection" unless you want heuristic obfuscation/anti-analysis hits.
flag_types = packer,protector,cryptor,crypter,virus,malware,trojan

# Reduce false positives from vendor obfuscation, anti-analysis stubs, and common JS tooling.
require_non_heuristic = true
ignore_names = javascript-obfuscator
ignore_heuristic_names = Generic,Obfuscation,Anti analysis,Anomalous build info
allow_heuristic_names =
skip_authenticode_heuristic_only = true

# diec scan options
heuristic_scan = true
deep_scan = false
aggressive_scan = false
hide_unknown = true
