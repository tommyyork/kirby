# oletools scan configuration
targets = folder,file,list
file_list = tmp/all_files

# Comma-separated extensions (olevba-compatible Office/OLE formats)
extensions = .doc,.docm,.docx,.dot,.dotm,.xls,.xlsm,.xlsx,.xlt,.xltm,.xla,.xlam,.slk,.ppt,.pptm,.pptx,.pot,.potm,.pps,.ppsm,.pub,.vsd,.vsdm,.msi

# Skip Windows Recycle Bin $I* metadata sidecars (not real Office files)
exclude_recycle_bin_sidecars = true

# Require file content to match expected Office/OLE format signatures
validate_file_headers = true
