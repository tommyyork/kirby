# Sleuth Kit device and BitLocker settings
#
# Priority 1: when TARGET_DEVICE is set, these values are used regardless of -t.
# Priority 2: when TARGET_DEVICE is unset, -t can be a mount point and the module
#             will try to infer the block device (including dislocker-backed mounts).

# Block device or raw disk image for tsk_gettimes
# TARGET_DEVICE =
TARGET_DEVICE = /Volumes/4tb_storage/bitlocker-decrypted.raw

# true when the image requires BitLocker decryption (-k password for tsk_gettimes)
BITLOCKER = false

# BitLocker recovery password (with dashes). Required when BITLOCKER = true.
BITLOCKER_RECOVERY_PASSWORD =
