# simple-rescue configuration
targets = folder
file_list = tmp/all_files

# Windows profile layout (relative to scan target)
users_dir = Users
skip_user_profiles = Default,Default User,Public,All Users

# Profile subdirectories treated as user-owned content (relative to Users/<name>/)
# Leave empty to include the entire profile except skip_profile_paths
user_content_dirs = Desktop,Documents,Downloads,Pictures,Music,Videos,Contacts,OneDrive,Favorites

# Paths under a profile to exclude (relative to Users/<name>/)
skip_profile_paths = AppData/Local/Temp,AppData/Local/Microsoft/Windows/INetCache,AppData/Local/Microsoft/Windows/WebCache,NTUSER.DAT,ntuser.dat.LOG1,ntuser.dat.LOG2,UsrClass.dat,UsrClass.dat.LOG1,UsrClass.dat.LOG2

# Rescue file categories (comma-separated extensions, with or without leading dot)
document_extensions = .doc,.docx,.docm,.odt,.rtf,.txt,.pdf,.one,.pages
spreadsheet_extensions = .xls,.xlsx,.xlsm,.xlsb,.csv,.ods,.numbers
image_extensions = .jpg,.jpeg,.png,.gif,.bmp,.tif,.tiff,.webp,.heic,.heif,.raw,.cr2,.nef,.svg,.ico,.psd
email_extensions = .eml,.msg,.pst,.ost,.mbox,.mbx,.dbx

# mraptor settings (path to scan module config)
mraptor_config = modules/scan/mraptor/mraptor.conf

# Pass -m to mraptor to include matched heuristic strings in output
mraptor_show_matches = true
