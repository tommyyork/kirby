# sleuthkit-mactime analysis configuration

# End of the timeline window. Use NONE for today's date at run time.
END_DATE = NONE

# Hours before END_DATE to include in the timeline (72 = last 3 days).
DURATION = 72

# Local Sleuth Kit install prefix (built by modules/analysis/sleuthkit-mactime/build_sleuthkit.sh)
sleuthkit_prefix = modules/analysis/sleuthkit-mactime/install

# Optional timezone for mactime (-z), e.g. EST5EDT or UTC
timezone =