# RegRipper scan configuration
targets = folder
repo = RegRipper4.0
repo_url = https://github.com/keydet89/RegRipper4.0.git

# Relative paths under the scan target for system hives
system_hive = Windows/System32/config/SYSTEM
software_hive = Windows/System32/config/SOFTWARE
users_dir = Users

# User profile directories to skip when searching for NTUSER.DAT
skip_user_profiles = Default,Default User,Public,All Users

# Comma-separated plugin categories to analyze (run, services, winlogon, userassist, appcompatcache)
categories = run,services,winlogon,userassist,appcompatcache
